spring.application.name=ss08

# kết nối đến CSDL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/demo_ss08}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:123456}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

cloudinary.cloud-name=${CLOUD_NAME:my-storage-bucket}
cloudinary.api-key=${API_KEY:152922968893657}
cloudinary.api-secret=${API_SECRET:zEf-4lyxxrPqJc1TNe5pBOwL3s4}
